<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musaic</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <span id="logo">Musaic</span>
    <nav id="main-nav">
      <button id="nav-builder">Builder</button>
      <button id="nav-collection">Collection</button>
    </nav>
  </header>

  <main>
    <!-- BUILDER VIEW -->
    <section id="builder-view">
      <aside id="search-panel">
        <input type="search" id="search-bar" placeholder="Search artists, songs, albums...">
        <div id="results-container"></div>
      </aside>

      <div id="builder-main">
        <h2 id="mosaic-title" contenteditable="true">Your Musaic</h2>
        <div id="grid-size-picker"></div>
        <div id="mosaic-grid"></div>
        <div id="mosaic-actions">
          <button class="action-btn" id="fill-gaps">Fill Gaps</button>
          <button class="action-btn" id="randomize-covers">Randomize Order</button>
          <button class="action-btn" id="save-mosaic">Save Musaic</button>
        </div>
      </div>
    </section>


    <!-- COLLECTION VIEW -->
    <section id="collection-view" class="hidden">
      <h2 id="collection-header">My collection</h2>
      <div id="collection-grid">
        <button id="new-mosaic-btn">
          <span class="icon">+</span>
          <span>New Musaic</span>
        </button>
      </div>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
